            const extremeColor = (colors || [])[0] || '';
            const extremeAnchor = extremeColor ? `The terrain is ${extremeColor.toLowerCase()} as far as your visor can resolve.` : '';
            visitorExperience = `${scent.toLowerCase()}. ${atmosphere?.temp || 'Extreme temperatures'}. ${extremeAnchor} ${breathability === 'TOXIC' || breathability === 'DEADLY' ? 'Your suit alarms have been quiet for twenty minutes. You decide that is worse than the noise.' : 'The silence is absolute. No wind. No geological activity. No signal.'} You kneel and examine a crack in the surface. Inside, something shimmer — ${_pick(microHabitats)}. Life, maybe. You cannot stay long enough to find out. No one could.`;
        }

        return {
            plantLife, animalLife, civilization, visitorExperience,
            fullDescription: `=== WHAT IT FEELS LIKE TO BE THERE ===\n${visitorExperience}\n\n=== INTELLIGENT LIFE ===\n${civilization}\n\n=== ANIMAL LIFE ===\n${animalLife}\n\n=== PLANT LIFE ===\n${plantLife}`
        };
    }

    // --- Step 7: RichCaption (uses ALL prior outputs) ---
    function generateRichCaption(vision, name, atmosphere, oceans, colorSource, life, ideaSeeds = null) {
        const colors = [...(vision?.primary_colors || []), ...(vision?.secondary_colors || [])];
        const surfaces = vision?.surface_qualities || [];
        const mood = (vision?.mood || 'earthy').toLowerCase();
        const color1 = colors[0]?.toLowerCase() || 'blue';
        const color2 = colors[1]?.toLowerCase() || 'bronze';
        const surface1 = surfaces[0]?.toLowerCase() || 'glossy';

        if (ideaSeeds && ideaSeeds.length > 0) {
            return generateCaptionWithSeeds(vision, name, color1, color2, surface1, surfaces[1]?.toLowerCase() || 'textured', ideaSeeds.map(s => s.seed_text).join(' '));
        }

        // Expand chemistry mappings to cover all real colors
        const chemistry = {
            'slate_blue': 'copper sulfate', 'chun_blue': 'chun crystalline deposits', 'denim': 'cobalt-iron oxides',
            'ice_blue': 'suspended ice micro-crystals', 'seafoam': 'biomineral calcium-copper compounds',
            'bronze': 'oxidized copper-tin alloy', 'pewter': 'tin-lead volcanic deposits',
            'rust': 'iron oxide', 'teal': 'transitional copper carbonates',
            'mahogany': 'iron-manganese oxides', 'oxblood': 'extreme-pressure hematite',
            'burgundy': 'manganese-iron reduction compounds', 'garnet': 'aluminum-silicate metamorphic minerals',
            'walnut': 'tannin-iron organics', 'chestnut': 'iron-rich clay compounds',
            'chocolate': 'compressed organic iron deposits', 'cocoa': 'manganese-iron carbonates',
            'olive': 'iron-magnesium silicates', 'terracotta': 'oxidized iron clay',
            'slate': 'compressed iron-silicate', 'charcoal': 'carbon-rich reduction deposits',
            'earth tones': 'mixed mineral strata',
            'amber': 'fossilized biological resin', 'honey': 'biological amber deposits',
            'taupe': 'iron-manganese silicates'
        };

        // Expand geoEvent mappings
        const geoEvent = {
            'crawling': 'tectonic movement', 'variegation': 'mineral stratification',
            'crackle': 'thermal shock fractures', 'color_pooling': 'mineral runoff collection',
            'carbon_trapping': 'reducing atmosphere sequestration', 'pinholing': 'volcanic vent outgassing',
            'breaking': 'contraction fractures', 'flashing': 'plasma discharge scarring',
            'running': 'molten mineral flow', 'luster': 'metallic crystallization',
            'speckled': 'impact debris scatter'
        };

        const chem1 = chemistry[color1] || `${color1} minerals`;
        const geo1 = geoEvent[surface1] || surface1;

        // Build atmosphere reference
        const atmoRef = atmosphere?.smell ? ` The air smells of ${atmosphere.smell.toLowerCase()}.` : '';
        // Build life reference
        const hasCiv = life?.civilization && !life.civilization.startsWith('None') && !life.civilization.startsWith('No ');
        const lifeRef = hasCiv ? ' Someone calls this place home.' : ' No one calls this place home — yet.';
        // Ocean reference
        const oceanRef = oceans?.types?.[0] ? ` Liquid exists here: ${oceans.types[0].split('.')[0]}.` : '';

        const captions = [
            `${name}. The ${color1} zones are ${chem1}. The ${surface1} texture marks ${geo1}.${atmoRef}${lifeRef} What chemistry do you read in its depths?`,
            `${name} — ${color1} meets ${color2}. ${geo1.charAt(0).toUpperCase() + geo1.slice(1)} shaped the surface.${oceanRef}${lifeRef} What do you think it is waiting for?`,
            `${name}. ${chem1.charAt(0).toUpperCase() + chem1.slice(1)} creates the ${color1} zones. ${atmosphere?.temp ? atmosphere.temp.split(' - ')[0] + '.' : ''}${lifeRef} What story does the surface tell you?`,
            `${name}. ${geo1.charAt(0).toUpperCase() + geo1.slice(1)} from ${chem1}. ${oceanRef}The ${mood} mood of this world is palpable.${lifeRef} What would you do if you found it?`
        ];
        return captions[Math.floor(Math.random() * captions.length)];
    }

    function generateCaptionWithSeeds(vision, name, color1, color2, surface1, surface2, seedText) {
        const themes = { 'memory': 'crystallized into the geology itself', 'time': 'frozen mid-reaction', 'water': 'trapped in crystal lattices', 'light': 'diffracted through mineral clouds', 'fire': 'still radiating from below', 'growth': 'pushing through toxic substrate', 'ancient': 'older than the survey instruments can measure' };
        const matches = Object.entries(themes).filter(([k]) => seedText.toLowerCase().includes(k));
        const frame = matches.length > 0 ? matches[0][1] : 'the surface holds something the instruments can\'t quantify';
        const captions = [
            `${name}. ${seedText.charAt(0).toUpperCase() + seedText.slice(1)} — that's what the survey team wrote first. ${frame}. What does this world make you want to remember?`,
            `${name} — ${seedText.charAt(0).toUpperCase() + seedText.slice(1)}. The ${color1} and ${surface1} geology supports it: ${frame}. What does the surface tell you?`
        ];
        return captions[Math.floor(Math.random() * captions.length)];
    }

    // --- Step 8: Orchestrator (dependency-ordered, passes outputs forward) ---
    function generateWorldbuilding(vision, planetName, ideaSeeds = null) {
        const colors = [...(vision?.primary_colors || []), ...(vision?.secondary_colors || [])];
        const surfaces = vision?.surface_qualities || [];
        const glaze = vision?.glaze_type || '';
        const mood = vision?.mood || 'earthy';
        const formAttributes = vision?.form_attributes || [];
        const clayType = vision?.clay_type || '';
        const technique = vision?.technique || '';
        const hypotheses = vision?.hypotheses || [];

        // Generate in dependency order, passing outputs forward
        const atmosphere = generateAtmosphere(glaze, colors, mood, surfaces);
        const oceans = generateOceans(colors, glaze, atmosphere);
        const colorSource = generateColorSource(colors, glaze, surfaces, mood);
        const formation = generateFormationStory(vision, planetName, surfaces, glaze, clayType, technique, formAttributes, atmosphere);
        const life = generateLife(atmosphere, oceans, formation, glaze, colors, surfaces, mood, formAttributes, clayType, technique, hypotheses);
        const caption = generateRichCaption(vision, planetName, atmosphere, oceans, colorSource, life, ideaSeeds);

        return { orbitalData: atmosphere.classification, surfaceGeology: oceans.description, formationHistory: formation, inhabitants: life.fullDescription, caption };
    }

    // === Init ===
    handleHash();
    loadData();
    </script>
